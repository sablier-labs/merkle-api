name: "Deploy on Vercel"

# Allow only one concurrent deployment, canceling runs queued between the run in-progress and latest queued
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

on:
  # Can be manually triggered by any member with Write permission
  workflow_dispatch:

jobs:
  ci:
    name: "Run CI checks"
    uses: "./.github/workflows/ci.yml"

  deploy:
    environment: "Production"
    needs: "ci"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v6"

      # vercel-rust@4 cross-compiles via `cargo zigbuild --target x86_64-unknown-linux-gnu`
      # whenever it runs outside Vercel's build image, so we need zig + cargo-zigbuild.
      - name: "Install Rust"
        uses: "dtolnay/rust-toolchain@nightly"

      - name: "Install Zig"
        uses: "mlugg/setup-zig@v2"

      - name: "Install cargo-zigbuild"
        uses: "taiki-e/install-action@v2"
        with:
          tool: "cargo-zigbuild"

      - name: "Cache Rust build artifacts"
        uses: "Swatinem/rust-cache@v2"
        with:
          shared-key: "deploy"

      - name: "Set up Node.js"
        uses: "actions/setup-node@v4"
        with:
          node-version: "20"

      - name: "Install Vercel CLI"
        run: "npm install --global vercel@latest"

      - name: "Vercel: pull environment"
        run: "vercel pull --environment=production --yes"

      - name: "Vercel: build project artifacts"
        run: "vercel build --prod"

      - name: "Deploy to Vercel"
        run: "vercel deploy --prod --prebuilt"
